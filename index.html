<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Communic8 — Marketing &amp; Sales Board</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#7A9B7E" />
<link rel="icon" type="image/png" href="assets/app-icon-192.png" />
<link rel="apple-touch-icon" href="assets/app-icon-192.png" />
<style>
  :root {
    --paper:      #FAF7F2;
    --paper-dim:  #F1ECE3;
    --ink:        #1F2937;
    --ink-soft:   #5B6472;
    --line:       #DAD3C6;

    --sage:       #7A9B7E;
    --sage-dark:  #4A6B4F;
    --sage-tint:  #E7EEE6;

    --clay:       #C97D5D;
    --clay-dark:  #8A4F36;
    --clay-tint:  #F3E3DA;

    --coral:      #E07A6F; --coral-tint: #FBEAE7;
    --amber:      #D9A441; --amber-tint: #FBF1DC;
    --teal:       #4D8C8C; --teal-tint:  #E2EFEF;
    --blue:       #5A7FB5; --blue-tint:  #E4EBF5;
    --gray:       #8C8C8C; --gray-tint:  #ECECEC;
    --purple:     #8C6FB0; --purple-tint:#EEE6F5;
    --green:      #6FA15A; --green-tint: #E9F1E3;
    --pink:       #C97DA0; --pink-tint:  #F6E6EE;

    --shadow: 0 1px 2px rgba(31,41,55,0.06), 0 2px 8px rgba(31,41,55,0.06);
    --shadow-lift: 0 6px 20px rgba(31,41,55,0.16);

    --serif: "Source Serif 4", "Iowan Old Style", Georgia, serif;
    --sans:  "Inter", "Helvetica Neue", Arial, sans-serif;
    --mono:  "IBM Plex Mono", "SF Mono", Consolas, monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    height: 100%;
    overflow: hidden;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ── Header ─────────────────────────────────────────────── */
  header {
    flex: 0 0 auto;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 18px 28px 14px;
    border-bottom: 1px solid var(--line);
    background: var(--paper);
  }

  header .title-block { display: flex; align-items: baseline; gap: 12px; }

  header h1 {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 22px;
    margin: 0;
    color: var(--ink);
    letter-spacing: 0.2px;
  }

  header .subtitle {
    font-size: 13px;
    color: var(--ink-soft);
    font-style: italic;
  }

  header .stats {
    display: flex;
    gap: 18px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-soft);
  }

  header .stats b { color: var(--ink); font-weight: 600; }

  /* ── Toolbar ────────────────────────────────────────────── */
  #toolbar {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 28px;
    border-bottom: 1px solid var(--line);
    background: var(--paper-dim);
    flex-wrap: wrap;
  }

  .btn {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    border: 1px solid var(--line);
    background: var(--paper);
    color: var(--ink);
    padding: 6px 14px;
    border-radius: 7px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn:hover { background: var(--sage-tint); border-color: var(--sage); }
  .btn.primary { background: var(--sage); color: white; border-color: var(--sage-dark); }
  .btn.primary:hover { background: var(--sage-dark); }

  #search {
    font-family: var(--sans);
    font-size: 13px;
    border: 1px solid var(--line);
    background: var(--paper);
    padding: 6px 12px;
    border-radius: 7px;
    width: 220px;
    color: var(--ink);
  }
  #search:focus { outline: none; border-color: var(--sage); }

  .toolbar-spacer { flex: 1; }

  .legend {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 12px;
    color: var(--ink-soft);
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .legend-dot.creation { background: var(--sage); }
  .legend-dot.application { background: var(--clay); }

  /* ── Main split: canvas (top) / calendar (bottom) ──────────── */
  #main-split {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  #canvas-wrap {
    flex: 1 1 55%;
    min-height: 180px;
    position: relative;
    overflow: auto;
    background:
      radial-gradient(circle at 1px 1px, rgba(31,41,55,0.05) 1px, transparent 0) 0 0/22px 22px,
      var(--paper);
  }

  #canvas {
    position: relative;
    width: 2300px;
    height: 1850px;
  }

  .cluster-halo {
    position: absolute;
    border-radius: 40px;
    pointer-events: none;
    opacity: 0.55;
  }

  .cluster-label {
    position: absolute;
    font-family: var(--serif);
    font-size: 13px;
    font-style: italic;
    color: var(--ink-soft);
    pointer-events: none;
    padding: 2px 6px;
  }

  /* divider between canvas and calendar */
  #divider {
    flex: 0 0 auto;
    height: 10px;
    background: var(--paper-dim);
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    cursor: row-resize;
    position: relative;
  }
  #divider::after {
    content: "";
    position: absolute;
    left: 50%;
    top: 50%;
    width: 50px;
    height: 3px;
    background: var(--line);
    border-radius: 2px;
    transform: translate(-50%, -50%);
  }

  /* ── Calendar ───────────────────────────────────────────── */
  #calendar-wrap {
    flex: 1 1 45%;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    background: var(--paper);
    overflow: hidden;
  }

  #calendar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    border-bottom: 1px solid var(--line);
    flex: 0 0 auto;
  }

  #calendar-header .week-label {
    font-family: var(--serif);
    font-size: 15px;
    font-weight: 600;
  }

  #calendar-nav { display: flex; gap: 6px; align-items: center; }
  #calendar-nav .btn { padding: 4px 10px; font-size: 12px; }

  #calendar-grid {
    flex: 1 1 auto;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    overflow-y: auto;
    min-height: 0;
  }

  .day-col {
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    min-height: 100%;
  }
  .day-col:last-child { border-right: none; }

  .day-col-header {
    flex: 0 0 auto;
    padding: 8px 10px 6px;
    border-bottom: 1px solid var(--line);
    background: var(--paper-dim);
    position: sticky;
    top: 0;
  }

  .day-name {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .day-date {
    font-family: var(--serif);
    font-size: 16px;
    font-weight: 600;
    color: var(--ink);
  }
  .day-col.today .day-col-header { background: var(--sage-tint); }

  .day-drop-zone {
    flex: 1 1 auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 90px;
  }
  .day-drop-zone.drag-over {
    background: var(--sage-tint);
    outline: 2px dashed var(--sage);
    outline-offset: -4px;
  }

  /* ── Idea cards (canvas) ────────────────────────────────── */
  .idea-card {
    position: absolute;
    width: 190px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 10px;
    box-shadow: var(--shadow);
    padding: 10px 12px;
    cursor: grab;
    user-select: none;
    transition: box-shadow 0.15s, transform 0.1s;
  }
  .idea-card:hover { box-shadow: var(--shadow-lift); }
  .idea-card.dragging { opacity: 0.5; }

  .idea-card .cat-tag {
    font-family: var(--mono);
    font-size: 9.5px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    opacity: 0.75;
    margin-bottom: 4px;
    display: inline-block;
  }

  .idea-card .idea-title {
    font-family: var(--sans);
    font-weight: 600;
    font-size: 13px;
    line-height: 1.3;
    color: var(--ink);
    margin-bottom: 4px;
  }

  .idea-card .idea-desc {
    font-size: 11.5px;
    color: var(--ink-soft);
    line-height: 1.35;
    margin-bottom: 6px;
  }

  .idea-card .spawn-row {
    display: flex;
    gap: 6px;
    margin-top: 4px;
  }

  .spawn-btn {
    flex: 1;
    font-family: var(--sans);
    font-size: 10.5px;
    font-weight: 600;
    border: none;
    border-radius: 6px;
    padding: 5px 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .spawn-btn img { width: 12px; height: 12px; }
  .spawn-btn.creation { background: var(--sage-tint); color: var(--sage-dark); }
  .spawn-btn.creation:hover { background: var(--sage); color: white; }
  .spawn-btn.application { background: var(--clay-tint); color: var(--clay-dark); }
  .spawn-btn.application:hover { background: var(--clay); color: white; }
  .spawn-btn.spawned { opacity: 0.45; cursor: default; }

  /* ── Child cards (creation / application) ──────────────── */
  .child-card {
    border-radius: 8px;
    padding: 7px 9px;
    font-size: 11.5px;
    cursor: grab;
    border: 1px solid transparent;
    box-shadow: var(--shadow);
    background: var(--paper);
    user-select: none;
  }
  .child-card.dragging { opacity: 0.4; }
  .child-card .child-head {
    display: flex;
    align-items: center;
    gap: 5px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .child-card .child-head img { width: 11px; height: 11px; }
  .child-card .child-parent {
    font-size: 10px;
    opacity: 0.7;
    line-height: 1.25;
  }

  .child-card.creation { background: var(--sage-tint); border-color: var(--sage); color: var(--sage-dark); }
  .child-card.application { background: var(--clay-tint); border-color: var(--clay); color: var(--clay-dark); }

  .child-card.done {
    background: var(--gray-tint) !important;
    border-color: var(--line) !important;
    color: var(--ink-soft) !important;
    text-decoration: line-through;
    opacity: 0.7;
  }

  .child-card .done-toggle {
    float: right;
    cursor: pointer;
    font-size: 12px;
    margin-left: 6px;
  }

  /* canvas tray for unscheduled children */
  #unscheduled-tray {
    flex: 0 0 auto;
    border-top: 1px solid var(--line);
    background: var(--paper-dim);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    overflow-x: auto;
    min-height: 50px;
  }
  #unscheduled-tray .tray-label {
    font-family: var(--mono);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--ink-soft);
    flex: 0 0 auto;
  }
  #unscheduled-tray .tray-items {
    display: flex;
    gap: 8px;
    flex: 1 1 auto;
  }
  #unscheduled-tray .child-card { flex: 0 0 auto; width: 170px; }

  /* ── Modal for adding a new idea ───────────────────────── */
  #modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(31,41,55,0.35);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 50;
  }
  #modal-overlay.open { display: flex; }

  #modal {
    background: var(--paper);
    border-radius: 14px;
    padding: 22px 24px;
    width: 380px;
    box-shadow: var(--shadow-lift);
  }
  #modal h2 {
    font-family: var(--serif);
    font-size: 17px;
    margin: 0 0 14px;
  }
  #modal label {
    font-size: 12px;
    color: var(--ink-soft);
    display: block;
    margin: 10px 0 4px;
  }
  #modal input, #modal select, #modal textarea {
    width: 100%;
    font-family: var(--sans);
    font-size: 13px;
    border: 1px solid var(--line);
    border-radius: 7px;
    padding: 7px 9px;
    background: var(--paper);
    color: var(--ink);
  }
  #modal textarea { resize: vertical; min-height: 50px; }
  #modal .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 16px;
  }

  /* scrollbar polish */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 6px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-soft); }
</style>
</head>
<body>

<div id="app">

  <header>
    <div class="title-block">
      <h1>Communic8 — Marketing &amp; Sales Board</h1>
      <span class="subtitle">everything you could try, held loosely</span>
    </div>
    <div class="stats" id="header-stats"></div>
  </header>

  <div id="toolbar">
    <button class="btn primary" id="btn-add-idea">+ New idea</button>
    <input id="search" type="text" placeholder="Filter ideas…" />
    <div class="toolbar-spacer"></div>
    <div class="legend">
      <span class="legend-item"><span class="legend-dot creation"></span> Creation</span>
      <span class="legend-item"><span class="legend-dot application"></span> Application</span>
    </div>
  </div>

  <div id="main-split">
    <div id="canvas-wrap">
      <div id="canvas"></div>
    </div>

    <div id="unscheduled-tray">
      <span class="tray-label">Not yet scheduled</span>
      <div class="tray-items" id="tray-items"></div>
    </div>

    <div id="divider"></div>

    <div id="calendar-wrap">
      <div id="calendar-header">
        <div class="week-label" id="week-label">This week</div>
        <div id="calendar-nav">
          <button class="btn" id="btn-prev-week">‹ Prev</button>
          <button class="btn" id="btn-today">Today</button>
          <button class="btn" id="btn-next-week">Next ›</button>
        </div>
      </div>
      <div id="calendar-grid"></div>
    </div>
  </div>

</div>

<div id="modal-overlay">
  <div id="modal">
    <h2>Add a new idea</h2>
    <label>Category</label>
    <select id="modal-category"></select>
    <label>Title</label>
    <input id="modal-title" type="text" placeholder="e.g. Send a voice note to 3 old clients" />
    <label>Description (optional)</label>
    <textarea id="modal-desc" placeholder="A line or two of context…"></textarea>
    <div class="modal-actions">
      <button class="btn" id="btn-cancel-modal">Cancel</button>
      <button class="btn primary" id="btn-save-idea">Add idea</button>
    </div>
  </div>
</div>

<script src="data-embedded.js"></script>
<script src="app.js"></script>
</body>
</html>
